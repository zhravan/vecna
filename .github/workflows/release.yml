name: Release

on:
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Set version from version.txt
        id: version
        run: |
          V=$(cat version.txt | tr -d ' \n\r')
          if [[ ! "$V" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::version.txt must contain a semver (x.y.z), got: $V"
            exit 1
          fi
          echo "VERSION=$V" >> $GITHUB_OUTPUT
          echo "TAG=v$V" >> $GITHUB_OUTPUT

      - name: Test
        run: go test -v ./...

      - name: Vet
        run: go vet ./...

      - name: Build
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build \
              -ldflags "-s -w -X github.com/shravan20/vecna/cmd.Version=${{ steps.version.outputs.VERSION }}" \
              -o vecna.exe .
            zip vecna_${{ steps.version.outputs.VERSION }}_${{ matrix.goos }}_${{ matrix.goarch }}.zip vecna.exe
          else
            CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build \
              -ldflags "-s -w -X github.com/shravan20/vecna/cmd.Version=${{ steps.version.outputs.VERSION }}" \
              -o vecna .
            tar -czvf vecna_${{ steps.version.outputs.VERSION }}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz vecna
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: vecna_${{ matrix.goos }}_${{ matrix.goarch }}
          path: vecna_${{ steps.version.outputs.VERSION }}_${{ matrix.goos }}_${{ matrix.goarch }}.${{ matrix.goos == 'windows' && 'zip' || 'tar.gz' }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from version.txt
        id: version
        run: |
          V=$(cat version.txt | tr -d ' \n\r')
          if [[ ! "$V" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::version.txt must contain a semver (x.y.z), got: $V"
            exit 1
          fi
          echo "VERSION=$V" >> $GITHUB_OUTPUT
          echo "TAG=v$V" >> $GITHUB_OUTPUT

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect assets
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release/ \;
          ls release/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          make_latest: true
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}